name: Deploy to Fly

# Fully automatic deploy of the Gemini Live + claude-mem app to Fly.io.
# Runs on GitHub's runners (which can reach Fly), so no local tooling is needed.
#
# One-time setup — add two repository secrets
# (Settings -> Secrets and variables -> Actions -> New repository secret):
#   FLY_API_TOKEN   -> from `fly tokens create deploy` (or `fly auth token`)
#   GEMINI_API_KEY  -> your Google AI Studio key
# After that, every push to main (touching the app) deploys automatically, or
# trigger it by hand from the Actions tab ("Run workflow").

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "gemini-live-genai-python-sdk/**"
      - ".github/workflows/deploy-fly.yml"

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gemini-live-genai-python-sdk
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Resolve app + region from fly.toml
        id: cfg
        run: |
          APP=$(grep -E '^app\s*=' fly.toml | head -1 | cut -d'"' -f2)
          REGION=$(grep -E '^primary_region\s*=' fly.toml | head -1 | cut -d'"' -f2)
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "region=$REGION" >> "$GITHUB_OUTPUT"

      - name: Ensure app exists
        run: |
          flyctl apps list | grep -qw "${{ steps.cfg.outputs.app }}" \
            || flyctl apps create "${{ steps.cfg.outputs.app }}"

      - name: Ensure memory volume exists
        run: |
          flyctl volumes list -a "${{ steps.cfg.outputs.app }}" 2>/dev/null | grep -qw claude_mem_data \
            || flyctl volumes create claude_mem_data \
                 -a "${{ steps.cfg.outputs.app }}" \
                 --region "${{ steps.cfg.outputs.region }}" \
                 --size 1 --yes

      - name: Stage Gemini API key
        run: |
          flyctl secrets set GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --stage -a "${{ steps.cfg.outputs.app }}"

      - name: Deploy
        run: flyctl deploy --remote-only -a "${{ steps.cfg.outputs.app }}"
